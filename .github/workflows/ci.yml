name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: tests/test_helper
          severity: error

  syntax:
    name: bash -n syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -e
          for f in bin/cast-doctor install.sh uninstall.sh; do
            echo "  syntax: $f"
            bash -n "$f"
          done

  bats:
    name: bats / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install BATS
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bats-core
          else
            sudo apt-get update && sudo apt-get install -y bats
          fi
      - name: Run BATS
        run: bats tests/

  install-roundtrip:
    name: install.sh round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install + uninstall round-trip
        run: |
          set -e
          bash install.sh
          test -x "$HOME/.local/bin/cast-doctor"
          "$HOME/.local/bin/cast-doctor" version
          "$HOME/.local/bin/cast-doctor" --quick || true   # may exit non-zero on empty home; that's fine
          bash uninstall.sh
          test ! -f "$HOME/.local/bin/cast-doctor"
